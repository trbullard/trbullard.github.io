<!DOCTYPE html>
<html>
  <head>
    <title>Todo LIST</title>
  </head>
  <style>
   * {
    margin: 0px;
    padding: 0px;
    inset: 0px;
}
    
    .header {
 display: flex;
 flex-direction: column;
 justify-content: center;
 align-items: center;
 border: 5px rgb(92, 0, 28) solid;
 padding-left: 5px;
 padding-right: 5px;
 background-color: rgb(78, 72, 78);
 font-size: 1.5rem;
 font-family: sans-serif;
 color:rgb(255, 255, 255);
 border-style:groove;
}
   .X {
      text-decoration: line-through;
      text-decoration-color: rgb(255, 255, 255);
   }
   .grow {
    flex-grow: 1;
   }
   .flexdividend{
    display: flex;
    flex-direction: row;
     background-color: rgb(78, 72, 78);
   }
   .flexboxlist{
    display: flex;
    overflow: scroll;
    order: 1;
    flex-direction: column;
    border-color: rgb(0, 0, 0);
    background-image: ".//images.png";
    background-color: crimson;
    border: 2px;
    border-style: double;
    min-width: 30dvw;
    min-height: 95dvh;
    max-width: 30dvw;
    max-height: 95dvh;
    border-radius: 10px;
   }
   .flexboxytp{
    display: flex;
   flex-direction: column;
   order: 2;
   border: 2px;}
   .youtube-player{
    flex-direction: row;
    border-radius: 10px;
    border-color: rgb(255, 255, 0);
    border-style: dotted;
    border-width: 10px;
    background-color: crimson;
    
   }
  </style>
  <body>
    <h1 class="header"> Mr. Ant Tennas TO DO LIST!!!!</h1>
<div class="flexdividend">
    <div class="h-list, w-list, flexboxlist"(note todo)>  
      <input type="text" id="description">
      <button id="add">Add Item</button>
      <ol id="todo"></ol>
     
    </div>
    <div (note, Body)>
     
    </div>

  <div class="flexboxytp" (note, video player)>
  <video class="youtube-player" width="870" height="575" controls>
  <source src="./SuperSonicHero.mp4" type="video/mp4">
</video>

    <script>
      // defines constant variables, obtaining element ids
      const todo        = document.getElementById("todo")
      const add         = document.getElementById("add" )
      const description = document.getElementById("description")

      // creates new items, as stated, handles crossing out items, deleting items, along with the button and textbox
      function newItem(desc) {
        const li   = document.createElement("li"   )
        const cb   = document.createElement("input")
        const text = document.createElement("span" )
        const xout = document.createElement("button")

        function deleteItem() {
          todo.removeChild(li)
        }
        function crossoutItem(){
        text.classList.toggle("X")
        }

        xout.onclick = crossoutItem
        xout.innerText = "Done!"

        cb.onmouseup = deleteItem
        cb.type = "checkbox"
        text.innerText = desc
        li.appendChild(cb)
        li.appendChild(text)
        li.appendChild(xout)
        return li
      }
// adds the item with corresponding value
      function addItem() {
        const text = description.value
        description.value = ""
        todo.appendChild(newItem(text))
      }
// adds item with the "Add item" button being clicked
      add.onclick = addItem

    </script>
  </body>
</html>
