<!DOCTYPE html>
<html>
  <head>
    <title>Clicks</title>
  </head>
  <body>
    <script>
      // body height is 0 by default
      document.body.style.height = "100dvh"

      let clicks = 0

      function onClick() {
        clicks = clicks + 1
        console.log("Mouse was clicked", clicks, "times!   i also made a rectange to  show you where!!")

        
      }
       document.addEventListener('click', function(event) {
    
    const x = event.clientX;
    const y = event.clientY;

    
    const img = document.createElement('img');
    img.src = 'artworks-kOSAmH7Qwv3GyAIP-jQ3Dhg-t1080x1080.jpg'; 
    img.alt = 'click effect image';
    img.classList.add('click-image');

   
    const imageSize = 50; 
    img.style.left = (x - imageSize / 2) + 'px';
    img.style.top = (y - imageSize / 2) + 'px';

    
    document.body.appendChild(img);
    
    
    setTimeout(() => {
        document.body.removeChild(img);
    }, 1000); 
});
      document.body.onclick = onClick
    
    </script>
  </body>
</html>
